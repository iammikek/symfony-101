framework:
    secret: '%env(APP_SECRET)%'
    rate_limiter:
        auth_api:
            policy: 'fixed_window'
            limit: 10
            interval: '1 minute'
        write_api:
            policy: 'fixed_window'
            limit: 60
            interval: '1 minute'

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
