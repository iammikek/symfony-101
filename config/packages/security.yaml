security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        shop:
            pattern: ^/shop
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: shop_login
                check_path: shop_login
                username_parameter: email
                password_parameter: password
                default_target_path: shop_home
                enable_csrf: true
                csrf_token_id: authenticate
            logout:
                path: shop_logout
                target: shop_home
        api:
            pattern: ^/
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        - { path: ^/shop/items/new, roles: ROLE_USER }
        - { path: ^/auth/me, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
        firewalls:
            shop:
                form_login:
                    enable_csrf: false
